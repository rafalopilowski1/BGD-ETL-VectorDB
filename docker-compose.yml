services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bgd_vector_db
    environment:
      POSTGRES_DB: bgd
      POSTGRES_USER: bgd
      POSTGRES_PASSWORD: bgd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgd -d bgd"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bgd_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_LISTENERS: >-
        PLAINTEXT://:29092,
        PLAINTEXT_HOST://:9092,
        CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redpanda-console:
    image: redpandadata/console:v2.3.5
    container_name: bgd_console
    environment:
      KAFKA_BROKERS: kafka:29092
    ports:
      - "8080:8080"
    depends_on:
      - kafka

  etl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bgd_etl
    environment:
      DATABASE_URL: postgresql://bgd:bgd@postgres:5432/bgd
      KAFKA_BOOTSTRAP: kafka:29092
      STREAM_INTERVAL_SECONDS: "300"
      STREAM_BATCH_SIZE: "100"
      STREAM_MAX_TOTAL: "1000"
      STREAM_RSS_CATEGORY: "cs"
      STREAM_RSS_MAX_PAPERS: "50"
    volumes:
      # Persist incoming / processed / split data across restarts
      - ./data:/app/data
      # Persist downloaded embedding model so it survives container restarts
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # Default: continuous streaming from arXiv API
    # Override at runtime for other modes, e.g.:
    #   docker compose run --rm etl python -m core.watcher
    #   docker compose run --rm etl python -m core.streamer --rss
    #   docker compose run --rm etl python -m core.producer
    command: ["python", "-m", "core.streamer"]

volumes:
  pgdata:
  kafka_data:
  model_cache:
