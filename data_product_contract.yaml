product_name: arXiv RAG Semantic Search Vector DB
product_owner: Rafał Opiłowski
product_owner_contact: s24815@pjwstk.edu.pl
description: >
  A curated vector database product built from the Cornell arXiv dataset, designed
  to power Retrieval-Augmented Generation (RAG) semantic search over 1.7M+
  scientific papers. Each paper is represented by a dense embedding (vector) of
  its title and abstract, enabling fast similarity search and context retrieval
  for LLM-based applications.
version: "1.0.0"
last_updated: "2025-05-09"
status: Production-like

business_domain: Scientific Research / Academic Information Retrieval
primary_users:
  - Data Science students building RAG applications
  - Researchers conducting literature reviews via natural language queries
  - LLM application developers needing grounded scientific context

data_sources:
  - name: arXiv Kaggle Dataset
    provider: Cornell University
    type: Dataset (JSON + PDFs)
    url: https://www.kaggle.com/datasets/Cornell-University/arxiv
    refresh_frequency: Weekly (Kaggle updates)
    description: >
      Machine-readable corpus of 1.7M+ arXiv articles with metadata
      (titles, authors, categories, abstracts) and full-text PDFs.

  - name: arXiv OAI-PMH API
    provider: arXiv.org
    type: API
    url: https://export.arxiv.org/oai2
    refresh_frequency: Daily
    description: >
      Official metadata harvesting endpoint for incremental updates
      and new paper ingestion.

schema:
  - name: arxiv_id
    type: string
    description: Unique arXiv identifier (e.g., 0704.0001, 2501.12345)
    example: "2308.13088"
    nullable: false
    is_primary_key: true

  - name: title
    type: string
    description: Full title of the paper
    example: "Attention Is All You Need"
    nullable: false

  - name: authors
    type: array<string>
    description: List of author names
    example: '["Ashish Vaswani", "Noam Shazeer", "Niki Parmar"]'
    nullable: true

  - name: abstract
    type: string
    description: Paper abstract text used for embedding generation
    example: "The dominant sequence transduction models are based on complex recurrent..."
    nullable: true

  - name: categories
    type: array<string>
    description: arXiv subject categories (e.g., cs.AI, cs.CL, math.CO)
    example: '["cs.CL", "cs.AI", "cs.LG"]'
    nullable: true

  - name: submit_date
    type: date
    description: Original submission date to arXiv
    example: "2017-06-12"
    nullable: true

  - name: update_date
    type: date
    description: Last update date in arXiv
    example: "2023-08-15"
    nullable: true

  - name: doi
    type: string
    description: Digital Object Identifier if available
    example: "10.48550/arXiv.1706.03762"
    nullable: true

  - name: journal_ref
    type: string
    description: Journal reference if published
    example: "NeurIPS 2017"
    nullable: true

  - name: pdf_url
    type: string
    description: Direct link to arXiv PDF
    example: "https://arxiv.org/pdf/1706.03762.pdf"
    nullable: false

  - name: embedding
    type: array<float32>
    description: >
      Dense vector representation of title + abstract generated by
      a sentence-transformer model (e.g., all-MiniLM-L6-v2, 384-dim
      or text-embedding-3-large, 3072-dim)
    example: "[0.023, -0.156, 0.891, ...]"
    nullable: false
    vector_dimension: 384
    vector_index: hnsw

  - name: metadata_json
    type: json
    description: Raw arXiv metadata blob for extensibility
    example: '{"versions": [...], "comments": "..."}'
    nullable: true

refresh_frequency: Weekly (full refresh) + Daily (incremental via OAI-PMH)
update_trigger: Apache Airflow DAG
storage_location: ChromaDB (local vector database)
expected_volume: "~1.7M vectors, ~6 GB metadata + vector store"
dependencies:
  - Kaggle arXiv dataset availability
  - arXiv OAI-PMH API uptime
  - Embedding model API (OpenAI / HuggingFace / local)

access_method:
  type: ChromaDB + Python SDK
  endpoint: "local path (e.g., ./chroma_db)"
  authentication: None (local)
  python_sdk: "pip install chromadb"
  example_connection: |
    import chromadb
    client = chromadb.PersistentClient(path="./chroma_db")
    collection = client.get_collection("arxiv-rag-vectors")
    # Query top-5 similar papers to a research question
    results = collection.query(
        query_embeddings=[embedding_model.encode("transformer architectures")],
        n_results=5,
        where={"categories": {"$in": ["cs.AI", "cs.LG"]}}
    )

quality_metrics:
  - metric_name: Embedding Completeness
    definition: >
      Percentage of papers in the bronze layer that have a successfully
      generated embedding in the gold vector store.
    current_value: "99.4%"
    threshold: "> 98%"
    update_cadence: Every pipeline run
    calculation: |
      SELECT COUNT(*) FILTER (WHERE embedding IS NOT NULL) * 100.0 / COUNT(*)
      FROM arxiv_vectors;

  - metric_name: Abstract Freshness
    definition: >
      Time elapsed (in hours) since the last successful incremental sync
      with arXiv OAI-PMH captured a new or updated paper.
    current_value: "18 hours"
    threshold: "< 48 hours"
    update_cadence: Daily
    calculation: |
      SELECT EXTRACT(EPOCH FROM (NOW() - MAX(sync_timestamp))) / 3600
      FROM pipeline_runs WHERE status = 'success';

  - metric_name: Schema Validity
    definition: >
      Percentage of records with a valid arXiv ID format
      (matches regex ^\d{4}\.\d{4,5}$ or ^[a-z-]+/\d{7}$)
      and non-null title + abstract.
    current_value: "99.8%"
    threshold: "= 100%"
    update_cadence: Every pipeline run
    calculation: |
      SELECT COUNT(*) FILTER (WHERE arxiv_id ~ '^\d{4}\.\d{4,5}$'
                                 AND title IS NOT NULL
                                 AND abstract IS NOT NULL) * 100.0 / COUNT(*)
      FROM arxiv_vectors;

  - metric_name: Vector Dimension Consistency
    definition: >
      Percentage of embeddings with the expected dimension (e.g., 384).
    current_value: "100%"
    threshold: "= 100%"
    update_cadence: Every pipeline run
    calculation: |
      SELECT COUNT(*) FILTER (WHERE array_length(embedding) = 384) * 100.0 / COUNT(*)
      FROM arxiv_vectors;

known_limitations:
  - >
    Full-text PDF content is NOT embedded; only title + abstract are vectorized.
    Long papers with critical details in body text may be under-represented.
  - >
    arXiv categories are hierarchical but stored flat; consumers must map
    parent/child relationships themselves if needed.
  - >
    Author names are stored as plain strings without ORCID disambiguation;
    homonyms (same name, different person) are not resolved.
  - >
    Weekly full-refresh from Kaggle may lag behind arXiv by 1-7 days;
    daily incremental sync mitigates but does not eliminate this gap.
  - >
    Embedding model choice affects semantic quality; switching models
    requires full re-indexing of all vectors.
  - >
    PDF URLs link to arXiv servers; rate limits and availability are
    outside this product's control.

example_usage:
  business_question: >
    "Find recent papers on transformer architectures published in
    computer vision categories."
  python_code: |
    from sentence_transformers import SentenceTransformer
    import chromadb

    model = SentenceTransformer('all-MiniLM-L6-v2')
    client = chromadb.PersistentClient(path="./chroma_db")
    collection = client.get_collection("arxiv-rag-vectors")

    query = "transformer architectures for computer vision"
    embedding = model.encode(query).tolist()

    results = collection.query(
        query_embeddings=[embedding],
        n_results=10,
        where={
            "categories": {"$in": ["cs.CV"]},
            "submit_date": {"$gte": "2023-01-01"}
        }
    )

    for i, doc in enumerate(results['documents'][0]):
        score = results['distances'][0][i]
        meta = results['metadatas'][0][i]
        print(f"{score:.3f} | {doc} | {meta['arxiv_id']}")

sla:
  availability_target: "99.0%"
  max_query_latency_p95: "500ms"
  data_freshness_max_lag: "48 hours"

security_and_compliance:
  data_classification: Public Open Data
  license: arXiv non-exclusive distribution license
  pii: false
  retention_policy: "Keep last 3 weekly snapshots + current production index"

git_repository: https://github.com/rafalopilowski1/BGD-ETL-VectorDB
